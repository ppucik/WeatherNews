version: "3.9"

services:
  weathernews-api:
    container_name: weathernews-api
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      Auth__JwtKey: "dev-secret-key-change-weather-api"
      Auth__Issuer: "weather-api"
      Auth__Audience: "weather-api-clients"
    restart: unless-stopped