apiVersion: v1
kind: Service
metadata:
  name: weathernews-api-service
  namespace: weather-system
  labels:
    app: weathernews-api
spec:
  type: ClusterIP
  selector:
    app: weathernews-api
    version: v1
  ports:
  - name: http
    protocol: TCP
    port: 80
    targetPort: 8080
  sessionAffinity: None