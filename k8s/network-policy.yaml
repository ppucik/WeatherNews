apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: weathernews-api-network-policy
  namespace: weather-system
spec:
  podSelector:
    matchLabels:
      app: weathernews-api
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 8080